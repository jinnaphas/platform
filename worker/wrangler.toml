# สำหรับคนที่ deploy ผ่าน CLI (wrangler) — ถ้า deploy ผ่านหน้าเว็บ Cloudflare ไม่ต้องใช้ไฟล์นี้
name = "rst-arch-sync"
main = "worker.js"
compatibility_date = "2026-07-01"

[vars]
GITHUB_REPO = "jinnaphas/platform"
GITHUB_BRANCH = "main"
DATA_DIR = "data"

# secrets — ห้ามใส่ค่าในไฟล์นี้ ให้ตั้งผ่านคำสั่ง:
#   wrangler secret put GITHUB_TOKEN
#   wrangler secret put PASSCODES_JSON
